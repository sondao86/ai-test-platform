# =============================================================================
# BRD Pipeline — Database Initialization
# Schema definition + seed data for development
# =============================================================================

# -----------------------------------------------------------------------------
# SCHEMA DEFINITION
# Mirrors the current state after all 5 Alembic migrations
# -----------------------------------------------------------------------------
schema:
  database: postgresql
  driver: asyncpg
  tables:

    - name: projects
      description: Root project entity — one BRD analysis pipeline run
      columns:
        - { name: id,            type: uuid,          pk: true }
        - { name: name,          type: varchar(255),   nullable: false }
        - { name: description,   type: text,           nullable: true }
        - { name: status,        type: varchar(30),    nullable: false, default: "created" }
        - { name: current_phase, type: integer,        nullable: false, default: 0 }
        - { name: file_path,     type: varchar(500),   nullable: true }
        - { name: file_name,     type: varchar(255),   nullable: true }
        - { name: raw_text,      type: text,           nullable: true }
        - { name: brd_version,   type: integer,        nullable: false, default: 1 }
        - { name: brd_source,    type: varchar(30),    nullable: true,  default: "upload" }
        - { name: created_at,    type: timestamptz,    nullable: false, server_default: "now()" }
        - { name: updated_at,    type: timestamptz,    nullable: false, server_default: "now()" }
      indexes: []
      foreign_keys: []

    - name: project_configs
      description: Per-project configuration (1:1 with projects)
      columns:
        - { name: id,                  type: uuid,          pk: true }
        - { name: project_id,          type: uuid,          nullable: false, unique: true }
        - { name: db_url,              type: varchar(1000),  nullable: true }
        - { name: dbt_project_dir,     type: varchar(500),   nullable: true }
        - { name: gx_context_dir,      type: varchar(500),   nullable: true }
        - { name: extra,               type: jsonb,          nullable: true,  default: "{}" }
        - { name: azure_wiki_org,      type: varchar(255),   nullable: true }
        - { name: azure_wiki_project,  type: varchar(255),   nullable: true }
        - { name: azure_wiki_name,     type: varchar(255),   nullable: true }
        - { name: azure_wiki_pat,      type: varchar(500),   nullable: true }
        - { name: created_at,          type: timestamptz,    nullable: false, server_default: "now()" }
        - { name: updated_at,          type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id, references: projects.id, on_delete: cascade }

    - name: brd_chunks
      description: Phase 1 output — chunked BRD document sections
      columns:
        - { name: id,               type: uuid,          pk: true }
        - { name: project_id,       type: uuid,          nullable: false }
        - { name: section_title,    type: varchar(500),   nullable: false }
        - { name: section_type,     type: varchar(100),   nullable: false }
        - { name: content,          type: text,           nullable: false }
        - { name: order_index,      type: integer,        nullable: false }
        - { name: metadata,         type: jsonb,          nullable: true,  default: "{}" }
        - { name: cross_references, type: jsonb,          nullable: true,  default: "[]" }
        - { name: created_at,       type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id, references: projects.id, on_delete: cascade }

    - name: clarifications
      description: Phase 2 output — clarification questions for ambiguous BRD sections
      columns:
        - { name: id,          type: uuid,          pk: true }
        - { name: project_id,  type: uuid,          nullable: false }
        - { name: chunk_id,    type: uuid,          nullable: true }
        - { name: question,    type: text,          nullable: false }
        - { name: category,    type: varchar(100),   nullable: false }
        - { name: severity,    type: varchar(30),    nullable: false, default: "medium" }
        - { name: answer,      type: text,           nullable: true }
        - { name: context,     type: jsonb,          nullable: true,  default: "{}" }
        - { name: created_at,  type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id, references: projects.id,    on_delete: cascade }
        - { column: chunk_id,   references: brd_chunks.id,  on_delete: set_null }

    - name: requirements
      description: Phase 2 output — structured requirements extracted from BRD
      columns:
        - { name: id,              type: uuid,          pk: true }
        - { name: project_id,      type: uuid,          nullable: false }
        - { name: chunk_id,        type: uuid,          nullable: true }
        - { name: requirement_id,  type: varchar(50),    nullable: false }
        - { name: title,           type: varchar(500),   nullable: false }
        - { name: description,     type: text,           nullable: false }
        - { name: priority,        type: varchar(30),    nullable: false, default: "medium" }
        - { name: business_rules,  type: jsonb,          nullable: true,  default: "[]" }
        - { name: kpis,            type: jsonb,          nullable: true,  default: "[]" }
        - { name: data_elements,   type: jsonb,          nullable: true,  default: "[]" }
        - { name: created_at,      type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id, references: projects.id,    on_delete: cascade }
        - { column: chunk_id,   references: brd_chunks.id,  on_delete: set_null }

    - name: test_category_mappings
      description: Phase 3 output — maps requirements to test categories, layers, domains
      columns:
        - { name: id,              type: uuid,          pk: true }
        - { name: project_id,      type: uuid,          nullable: false }
        - { name: requirement_id,  type: uuid,          nullable: true }
        - { name: test_category,   type: varchar(50),    nullable: false }
        - { name: sub_category,    type: varchar(100),   nullable: true }
        - { name: rationale,       type: text,           nullable: false }
        - { name: confidence,      type: float,          nullable: false, default: 0.0 }
        - { name: pipeline_layer,  type: varchar(50),    nullable: true }
        - { name: tool_suggestion, type: varchar(100),   nullable: true }
        - { name: domain,          type: varchar(50),    nullable: true }
        - { name: metadata,        type: jsonb,          nullable: true,  default: "{}" }
        - { name: created_at,      type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id,     references: projects.id,      on_delete: cascade }
        - { column: requirement_id, references: requirements.id,  on_delete: set_null }

    - name: test_cases
      description: Phase 4 output — generated test cases with SQL, dbt, GX configs
      columns:
        - { name: id,                        type: uuid,          pk: true }
        - { name: project_id,                type: uuid,          nullable: false }
        - { name: category_map_id,           type: uuid,          nullable: true }
        - { name: test_id,                   type: varchar(50),    nullable: false }
        - { name: title,                     type: varchar(500),   nullable: false }
        - { name: description,               type: text,           nullable: false }
        - { name: test_category,             type: varchar(50),    nullable: false }
        - { name: pipeline_layer,            type: varchar(50),    nullable: false }
        - { name: tool,                      type: varchar(100),   nullable: false }
        - { name: sql_logic,                 type: text,           nullable: true }
        - { name: dbt_test_yaml,             type: text,           nullable: true }
        - { name: great_expectations_config, type: jsonb,          nullable: true }
        - { name: input_data,                type: jsonb,          nullable: true }
        - { name: expected_result,           type: jsonb,          nullable: true }
        - { name: severity,                  type: varchar(30),    nullable: false, default: "medium" }
        - { name: priority,                  type: integer,        nullable: false, default: 3 }
        - { name: sla_seconds,               type: integer,        nullable: true }
        - { name: tags,                      type: jsonb,          nullable: true,  default: "[]" }
        - { name: is_active,                 type: boolean,        nullable: false, default: true }
        - { name: domain,                    type: varchar(50),    nullable: true }
        - { name: source,                    type: varchar(30),    nullable: false, default: "pipeline" }
        - { name: created_at,                type: timestamptz,    nullable: false, server_default: "now()" }
        - { name: updated_at,                type: timestamptz,    nullable: false, server_default: "now()" }
      indexes:
        - { name: ix_test_cases_project_active, columns: [project_id, is_active] }
      foreign_keys:
        - { column: project_id,      references: projects.id,                on_delete: cascade }
        - { column: category_map_id, references: test_category_mappings.id,  on_delete: set_null }

    - name: test_executions
      description: Test execution run container with aggregated results
      columns:
        - { name: id,           type: uuid,          pk: true }
        - { name: project_id,   type: uuid,          nullable: false }
        - { name: status,       type: varchar(30),    nullable: false, default: "pending" }
        - { name: triggered_by, type: varchar(50),    nullable: false, default: "user" }
        - { name: total_tests,  type: integer,        nullable: false, default: 0 }
        - { name: passed,       type: integer,        nullable: false, default: 0 }
        - { name: failed,       type: integer,        nullable: false, default: 0 }
        - { name: errors,       type: integer,        nullable: false, default: 0 }
        - { name: skipped,      type: integer,        nullable: false, default: 0 }
        - { name: duration_ms,  type: integer,        nullable: true }
        - { name: config,       type: jsonb,          nullable: true,  default: "{}" }
        - { name: started_at,   type: timestamptz,    nullable: true }
        - { name: finished_at,  type: timestamptz,    nullable: true }
        - { name: created_at,   type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id, references: projects.id, on_delete: cascade }

    - name: test_results
      description: Individual test result within an execution
      columns:
        - { name: id,              type: uuid,          pk: true }
        - { name: execution_id,    type: uuid,          nullable: false }
        - { name: test_case_id,    type: uuid,          nullable: false }
        - { name: status,          type: varchar(20),    nullable: false, default: "pending" }
        - { name: result,          type: varchar(20),    nullable: true }
        - { name: executor_type,   type: varchar(30),    nullable: false }
        - { name: actual_output,   type: jsonb,          nullable: true }
        - { name: expected_output, type: jsonb,          nullable: true }
        - { name: error_message,   type: varchar(2000),  nullable: true }
        - { name: error_detail,    type: jsonb,          nullable: true }
        - { name: rows_scanned,    type: integer,        nullable: true }
        - { name: rows_failed,     type: integer,        nullable: true }
        - { name: duration_ms,     type: integer,        nullable: true }
        - { name: sql_executed,    type: varchar(5000),  nullable: true }
        - { name: logs,            type: jsonb,          nullable: true,  default: "[]" }
        - { name: started_at,      type: timestamptz,    nullable: true }
        - { name: finished_at,     type: timestamptz,    nullable: true }
        - { name: created_at,      type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: execution_id,  references: test_executions.id, on_delete: cascade }
        - { column: test_case_id,  references: test_cases.id,      on_delete: cascade }

    - name: agent_reviews
      description: Multi-agent review records per phase
      columns:
        - { name: id,                      type: uuid,          pk: true }
        - { name: project_id,              type: uuid,          nullable: false }
        - { name: phase_id,                type: integer,        nullable: false }
        - { name: agent_id,                type: varchar(50),    nullable: false }
        - { name: agent_name,              type: varchar(100),   nullable: false }
        - { name: role,                    type: varchar(20),    nullable: false }
        - { name: status,                  type: varchar(30),    nullable: false }
        - { name: confidence,              type: float,          nullable: true }
        - { name: comments,                type: jsonb,          nullable: true,  default: "[]" }
        - { name: additions,               type: jsonb,          nullable: true,  default: "[]" }
        - { name: consolidation_summary,   type: jsonb,          nullable: true }
        - { name: revision_round,          type: integer,        nullable: false, default: 1 }
        - { name: created_at,              type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id, references: projects.id, on_delete: cascade }

    - name: phase_history
      description: Audit trail of phase transitions, decisions, and feedback
      columns:
        - { name: id,             type: uuid,          pk: true }
        - { name: project_id,     type: uuid,          nullable: false }
        - { name: phase_id,       type: integer,        nullable: false }
        - { name: phase_name,     type: varchar(50),    nullable: false }
        - { name: action,         type: varchar(50),    nullable: false }
        - { name: user_decision,  type: varchar(30),    nullable: true }
        - { name: user_feedback,  type: varchar(2000),  nullable: true }
        - { name: revision_round, type: integer,        nullable: false, default: 1 }
        - { name: snapshot,       type: jsonb,          nullable: true }
        - { name: created_at,     type: timestamptz,    nullable: false, server_default: "now()" }
      foreign_keys:
        - { column: project_id, references: projects.id, on_delete: cascade }


# -----------------------------------------------------------------------------
# SEED DATA
# One complete demo project that has passed through all 4 pipeline phases.
# UUIDs use a predictable pattern for easy reference:
#   550e8400-e29b-41d4-a716-44665544XXXX
